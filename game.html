<!DOCTYPE html>
<html>
<head>
  <title>Neon Racer: Smooth Shooter</title>
  <style>
    body { margin:0; background:black; overflow:hidden; font-family:Arial; }
    canvas { display:block; margin:auto; background:#111; }
    #ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:white; text-align:center; }
    #gameOverScreen { display:none; text-align:center; margin-top:50px; color:white; }
    button { padding:10px 20px; font-size:18px; margin-top:10px; }
  </style>
</head>
<body>
<div id="ui">
  <p>Score: <span id="score">0</span> | Coins: <span id="coins">0</span> | High Score: <span id="highScore">0</span></p>
</div>

<canvas id="game" width="300" height="500"></canvas>

<div id="gameOverScreen">
  <h2>💀 Game Over</h2>
  <p>Score: <span id="finalScore">0</span></p>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const lanes = [75, 150, 225];
let playerLane = 1;
let playerX = lanes[playerLane];
let targetLane = playerLane;
let cars = [];
let bullets = [];
let particles = [];
let score = 0, coins = 0, highScore = 0;
let speed = 4;
let gameRunning = true;
let roadOffset = 0;
let lastShotTime = 0;

// Initialize game
function initGame(){
  playerLane = 1;
  targetLane = 1;
  playerX = lanes[playerLane];
  cars = [];
  bullets = [];
  particles = [];
  score = 0;
  coins = 0;
  speed = 4;
  gameRunning = true;
  roadOffset = 0;
  document.getElementById("gameOverScreen").style.display = "none";
}

// Smooth lane movement
function updatePlayer(deltaTime){
  let targetX = lanes[targetLane];
  playerX += (targetX - playerX) * 0.2; // smooth slide
}

// Draw player with neon glow
function drawPlayer(){
  ctx.save();
  ctx.shadowColor = "lime";
  ctx.shadowBlur = 15;
  ctx.fillStyle = "lime";
  ctx.fillRect(playerX-15, 420-25, 30, 50);
  ctx.fillStyle = "#0f0";
  ctx.fillRect(playerX-10, 420-35, 20, 10);
  ctx.restore();
}

// Draw enemy
function drawEnemy(car){
  ctx.fillStyle = car.color;
  ctx.fillRect(lanes[car.lane]-15, car.y-25, 30,50);
}

// Draw bullet
function drawBullet(b){
  ctx.save();
  ctx.shadowColor="yellow";
  ctx.shadowBlur=10;
  ctx.fillStyle="yellow";
  ctx.fillRect(b.x-3, b.y-10, 6, 10);
  ctx.restore();
}

// Spawn enemies
function spawnCar(){
  if(!gameRunning) return;
  const lane = Math.floor(Math.random()*3);
  const colors=["red","orange","magenta","cyan"];
  const color = colors[Math.floor(Math.random()*colors.length)];
  cars.push({lane: lane, y:-60, color: color, destroyed:false});
}

// Explosion particles
function createExplosion(x, y){
  for(let i=0;i<15;i++){
    particles.push({
      x:x,
      y:y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:30+Math.random()*20,
      color:"orange"
    });
  }
}

// Draw road with moving stripes
function drawRoad(){
  ctx.fillStyle="#222";
  ctx.fillRect(50,0,200,500);
  ctx.strokeStyle="white";
  ctx.lineWidth=2;
  ctx.setLineDash([20,20]);
  ctx.beginPath();
  for(let y=-20;y<500;y+=40){
    ctx.moveTo(100, y + roadOffset);
    ctx.lineTo(100, y + 20 + roadOffset);
    ctx.moveTo(200, y + roadOffset);
    ctx.lineTo(200, y + 20 + roadOffset);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

// Controls
document.addEventListener("keydown",e=>{
  if(!gameRunning) return;
  if(e.key==="ArrowLeft") targetLane = Math.max(0,targetLane-1);
  if(e.key==="ArrowRight") targetLane = Math.min(2,targetLane+1);
  if(e.key===" ") shootBullet();
});
canvas.addEventListener("click",e=>{
  if(!gameRunning) return;
  if(e.offsetX < canvas.width/2) targetLane = Math.max(0,targetLane-1);
  else targetLane = Math.min(2,targetLane+1);
  shootBullet();
});

// Shoot bullet
function shootBullet(){
  const now = Date.now();
  if(now - lastShotTime < 250) return; // cooldown
  bullets.push({ x: playerX, y: 400 }); // spawn at current playerX
  lastShotTime = now;
}

// Main loop
let lastTime = 0;
function update(timestamp){
  if(!lastTime) lastTime=timestamp;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Road animation
  roadOffset += speed;
  if(roadOffset>40) roadOffset=0;
  drawRoad();

  updatePlayer(deltaTime);
  drawPlayer();

  // Bullets
  bullets.forEach(b=>{b.y-=10; drawBullet(b);});
  bullets = bullets.filter(b=>b.y>-10);

  // Enemies
  cars.forEach(car=>{
    car.y += speed;
    if(!car.destroyed) drawEnemy(car);

    // collision with player
    if(!car.destroyed && car.lane===targetLane && car.y>360 && car.y<460) gameOver();

    // bullet collision
    bullets.forEach(b=>{
      if(!car.destroyed && b.x > lanes[car.lane]-15 && b.x < lanes[car.lane]+15 &&
         b.y > car.y-25 && b.y < car.y+25){
        car.destroyed=true;
        createExplosion(lanes[car.lane],car.y);
        bullets.splice(bullets.indexOf(b),1);
        score += 50;
      }
    });
  });
  cars = cars.filter(c=>c.y<600);

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,3,3);
  });
  particles = particles.filter(p=>p.life>0);

  if(gameRunning){
    score++;
    speed += 0.0005;
  }

  // UI
  document.getElementById("score").innerText = Math.floor(score);
  document.getElementById("coins").innerText = coins;
  if(!highScore || score>highScore) highScore=score;
  document.getElementById("highScore").innerText = highScore;

  requestAnimationFrame(update);
}

function gameOver(){
  gameRunning=false;
  document.getElementById("finalScore").innerText=Math.floor(score);
  document.getElementById("gameOverScreen").style.display="block";
}

function restartGame(){ initGame(); }

setInterval(spawnCar, 1000);
initGame();
requestAnimationFrame(update);
</script>
</body>
</html>
