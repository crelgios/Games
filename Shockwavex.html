<!DOCTYPE html>
<html>
<head>
  <title>Neon Shooter - Neon PowerUps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:black; touch-action:none; }
    canvas { display:block; transition: transform 0.05s; }
  </style>
</head>
<body>
<audio id="bgMusic" src="background.mp3" loop></audio>

<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- PLAYER ---
const player = {
  x: canvas.width/2,
  y: canvas.height/2,
  radius: 12,
  speed: 0.15,
  targetX: canvas.width/2,
  targetY: canvas.height/2,
  shield: false
};

// --- GAME STATE ---
let bullets=[], enemies=[], particles=[], powerUps=[];
let score=0, highScore=localStorage.getItem("highScore")||0, lives=3;

// --- AUDIO ---
const bgMusic = document.getElementById("bgMusic");
bgMusic.volume = 0.3;

const shootSound = new Audio("shoot.mp3");
shootSound.volume = 0.4;
shootSound.preload = "auto";

const explodeSound = new Audio("explosion.mp3");
explodeSound.volume = 0.5;
explodeSound.preload = "auto";

const powerUpSound = new Audio("powerup.mp3");
powerUpSound.volume = 0.5;
powerUpSound.preload = "auto";

// Start music on first user interaction (required by browsers)
window.addEventListener("click", () => { bgMusic.play().catch(()=>{}); }, {once:true});
window.addEventListener("touchstart", () => { bgMusic.play().catch(()=>{}); }, {once:true});

// --- BACKGROUND STARS ---
let stars=[];
for(let i=0;i<80;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2, speed: Math.random()*0.5+0.2});
}

// --- AIM & POWER-UP STATE ---
let fireAngle=0;
let fireRate=120, spreadShot=false, explosionNext=false, autoFire=false;

// --- MOVEMENT & AIM ---
function setTarget(x,y){ 
  player.targetX = x; 
  player.targetY = y; 
  fireAngle = Math.atan2(y-player.y, x-player.x); 
}
canvas.addEventListener("mousemove", e => setTarget(e.clientX,e.clientY));
canvas.addEventListener("touchstart", e => setTarget(e.touches[0].clientX,e.touches[0].clientY));
canvas.addEventListener("touchmove", e => setTarget(e.touches[0].clientX,e.touches[0].clientY));

// --- AUTO-FIRE ---
function shoot(){
  if(spreadShot){
    [-0.2,0,0.2].forEach(angleOffset=>{
      bullets.push({
        x:player.x, y:player.y,
        dx: Math.cos(fireAngle+angleOffset)*7,
        dy: Math.sin(fireAngle+angleOffset)*7,
        radius:3, explosion: explosionNext
      });
    });
  } else {
    bullets.push({x:player.x, y:player.y, dx: Math.cos(fireAngle)*7, dy: Math.sin(fireAngle)*7, radius:3, explosion: explosionNext});
  }
  explosionNext=false;
  shootSound.currentTime = 0;
  shootSound.play();
}
setInterval(()=>{ if(!autoFire) shoot(); }, fireRate);

// --- ENEMIES & DIFFICULTY ---
let difficultyLevel = 1; 
let spawnInterval = 1500;

function spawnEnemy(){
  let e = {x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:12, hp:1, color:"red", speed:0.5 + difficultyLevel/50};
  if(difficultyLevel>20 && Math.random()<0.3){ e.color="orange"; e.speed*=1.5; }
  if(difficultyLevel>40 && Math.random()<0.2){ e.color="purple"; e.hp=3; e.radius=18; e.speed*=0.8; }
  if(difficultyLevel>70 && Math.random()<0.3){ e.color="purple"; e.hp=4; e.radius=20; e.speed*=1; }
  enemies.push(e);
}

function updateDifficulty(){
  difficultyLevel = Math.min(100, Math.floor(score/5)+1); 
  spawnInterval = 1500 - ((1500-350)*(difficultyLevel/100)); 
}

function enemySpawner(){
  updateDifficulty();
  spawnEnemy();
  setTimeout(enemySpawner,spawnInterval);
}
enemySpawner();

// --- POWERUPS ---
const powerUpTypes=["shield","rapid","spread","explosion","heart","autofire","wave"];
function spawnPowerUp(){ 
  const type = powerUpTypes[Math.floor(Math.random()*powerUpTypes.length)];
  powerUps.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    radius: 12,
    type: type,
    spawnTime: Date.now() // disappears if not collected in 10 sec
  });
}
setInterval(spawnPowerUp,6000);

// --- POWER-UP COLORS ---
const powerUpColors = {
  shield: "cyan",
  rapid: "yellow",
  spread: "magenta",
  explosion: "orange",
  heart: "red",
  autofire: "lime",
  wave: "aqua"
};

// --- POWER-UP EFFECT ---
function powerUpEffect(type){
  powerUpSound.currentTime = 0;
  powerUpSound.play();

  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*5+2;
    particles.push({
      x:player.x, y:player.y,
      dx: Math.cos(angle)*speed, dy: Math.sin(angle)*speed,
      life:40, size: Math.random()*4+2,
      color: powerUpColors[type]
    });
  }
}

// --- EXPLOSIONS ---
function explode(x,y){
  explodeSound.currentTime = 0;
  explodeSound.play();

  const colors=["#ff3b3b","#ffae00","#fff","#ff6b00"];
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2, speed=Math.random()*5+1;
    particles.push({x,y,dx:Math.cos(angle)*speed, dy:Math.sin(angle)*speed, life:50, size:Math.random()*3+1, color: colors[Math.floor(Math.random()*colors.length)]});
  }
}

// --- WAVE BLAST ---
function waveBlast(){
    let flashTime = 150;
    const flashInterval = setInterval(()=>{
        ctx.fillStyle = "rgba(0,255,255,0.08)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        flashTime -=16;
        if(flashTime<=0){ clearInterval(flashInterval); }
    },16);

    let shakeTime = 300;
    const shakeInterval = setInterval(()=>{
        canvas.style.transform = `translate(${Math.random()*12-6}px, ${Math.random()*12-6}px)`;
        shakeTime -= 16;
        if(shakeTime <=0){
            clearInterval(shakeInterval);
            canvas.style.transform = 'translate(0px,0px)';
        }
    },16);

    let radius = 0;
    const maxRadius = Math.max(canvas.width, canvas.height);
    const ringInterval = setInterval(()=>{
        radius += 25;

        for(let i=0;i<3;i++){
            const ringRadius = radius - i*20;
            if(ringRadius>0){
                const alpha = 0.4 - i*0.1;
                ctx.beginPath();
                ctx.arc(player.x, player.y, ringRadius,0,Math.PI*2);
                ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
                ctx.lineWidth = 4 - i;
                ctx.stroke();
            }
        }

        for(let i=0;i<40;i++){
            const angle = Math.random()*Math.PI*2;
            const speed = Math.random()*6+2;
            particles.push({
                x: player.x + Math.cos(angle)*radius,
                y: player.y + Math.sin(angle)*radius,
                dx: Math.cos(angle)*speed,
                dy: Math.sin(angle)*speed,
                life: 50,
                size: 3,
                color: "aqua"
            });
        }

        enemies = enemies.filter(e=>{
            if(Math.hypot(e.x-player.x, e.y-player.y) <= radius){
                explode(e.x,e.y);
                score++;
                return false;
            }
            return true;
        });

        if(radius >= maxRadius) clearInterval(ringInterval);

    },16);
}

// --- RESET POWERUPS ON LIFE LOST ---
function resetPowerUps(){
  fireRate=120;
  spreadShot=false;
  explosionNext=false;
  player.shield=false;
  autoFire=false;
}

// --- UPDATE ---
function update(){
  player.x += (player.targetX-player.x)*player.speed;
  player.y += (player.targetY-player.y)*player.speed;

  if(autoFire) shoot();

  bullets.forEach((b,i)=>{
    b.x+=b.dx; b.y+=b.dy;
    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1);
  });

  enemies.forEach(e=>{
    const ang=Math.atan2(player.y-e.y,player.x-e.x);
    e.x+=Math.cos(ang)*e.speed;
    e.y+=Math.sin(ang)*e.speed;
  });

  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<b.radius+e.radius){
        e.hp--; bullets.splice(bi,1);
        if(e.hp<=0){ explode(e.x,e.y); enemies.splice(ei,1); score++; }
        if(b.explosion) explode(e.x,e.y);
      }
    });
  });

  enemies.forEach((e,ei)=>{
    if(Math.hypot(player.x-e.x,player.y-e.y)<player.radius+e.radius){
      enemies.splice(ei,1);
      if(player.shield){ player.shield=false; explode(player.x,player.y); }
      else { lives--; explode(player.x,player.y); resetPowerUps();
        if(lives<=0){ if(score>highScore) localStorage.setItem("highScore",score);
          alert("Game Over\nScore:"+score); location.reload();
        }
      }
    }
  });

  // --- POWER-UP PICKUP ---
  const now = Date.now();
  powerUps = powerUps.filter(p => now - p.spawnTime < 10000);

  powerUps.forEach((p,pi)=>{
    if(Math.hypot(player.x-p.x,player.y-p.y)<player.radius+p.radius){
      powerUpEffect(p.type);
      
      switch(p.type){
        case "shield": player.shield = true; break;
        case "rapid": fireRate = 50; break;
        case "spread": spreadShot = true; break;
        case "explosion": explosionNext = true; break;
        case "autofire": 
          autoFire = true; 
          setTimeout(()=>{ autoFire = false; }, 15000); // 15s duration
          break;
        case "wave": waveBlast(); break;
        case "heart": lives = Math.min(lives+1, 9); break;
      }

      powerUps.splice(pi,1);
    }
  });

  particles.forEach((p,i)=>{ p.x+=p.dx; p.y+=p.dy; p.life--; if(p.life<=0) particles.splice(i,1); });
}

// --- DRAW ---
function draw(){
  const grad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width);
  grad.addColorStop(0,"#050510"); grad.addColorStop(1,"#000");
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  // stars
  stars.forEach(s=>{
    s.y+=s.speed;
    if(s.y>canvas.height){ s.y=0; s.x=Math.random()*canvas.width; }
    ctx.globalAlpha=Math.random(); ctx.fillStyle="white"; ctx.fillRect(s.x,s.y,s.size,s.size); ctx.globalAlpha=1;
  });

  // grid
  ctx.strokeStyle="rgba(0,255,255,0.08)";
  const g=40;
  for(let x=0;x<canvas.width;x+=g){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for(let y=0;y<canvas.height;y+=g){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  ctx.shadowBlur=20;

  // PLAYER
  ctx.shadowColor="cyan"; ctx.beginPath(); ctx.arc(player.x,player.y,player.radius,0,Math.PI*2); ctx.fillStyle="cyan"; ctx.fill();
  if(player.shield){ ctx.strokeStyle="blue"; ctx.beginPath(); ctx.arc(player.x,player.y,player.radius+5,0,Math.PI*2); ctx.stroke(); }

  // BULLETS
  ctx.shadowColor="white"; bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill(); });

  // ENEMIES
  enemies.forEach(e=>{ ctx.shadowColor=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2); ctx.fillStyle=e.color; ctx.fill(); });

  // POWERUPS
  powerUps.forEach(p=>{
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = powerUpColors[p.type];
    ctx.fillStyle = powerUpColors[p.type];

    switch(p.type){
        case "shield": ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2); ctx.fill(); break;
        case "rapid": ctx.beginPath(); ctx.moveTo(p.x-8,p.y); ctx.lineTo(p.x,p.y-12); ctx.lineTo(p.x+8,p.y); ctx.lineTo(p.x,p.y+12); ctx.closePath(); ctx.fill(); break;
        case "spread": for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(p.x+i*5,p.y-5,4,0,Math.PI*2); ctx.fill(); } break;
        case "explosion": ctx.beginPath(); ctx.moveTo(p.x-10,p.y); ctx.lineTo(p.x,p.y-10); ctx.lineTo(p.x+10,p.y); ctx.lineTo(p.x,p.y+10); ctx.closePath(); ctx.fill(); break;
        case "heart": ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.arc(p.x-5,p.y-3,5,0,Math.PI*2); ctx.arc(p.x+5,p.y-3,5,0,Math.PI*2); ctx.lineTo(p.x,p.y+10); ctx.fill(); break;
        case "autofire": ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2); ctx.lineWidth=3; ctx.strokeStyle=powerUpColors[p.type]; ctx.stroke(); break;
        case "wave": ctx.beginPath(); ctx.arc(p.x,p.y,14,0,Math.PI*2); ctx.lineWidth=4; ctx.strokeStyle=powerUpColors[p.type]; ctx.stroke(); break;
    }

    ctx.restore();
  });

  // PARTICLES
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/50;
    ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    ctx.globalAlpha=1;
  });

  ctx.shadowBlur=0;

  // --- UI ---
  const margin = 20;
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText("Score: " + score, margin, margin);
  ctx.fillText("High: " + highScore, margin, margin + 25);
  ctx.fillText("Lives: " + lives, margin, margin + 50);
  ctx.fillText("Difficulty: " + difficultyLevel, margin, margin + 75);
}

// --- GAME LOOP ---
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
